name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  BACKEND_REPO: ${{ vars.ECR_BACKEND_REPO }}
  FRONTEND_REPO: ${{ vars.ECR_FRONTEND_REPO }}

jobs:
  # ── Python lint ──────────────────────────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - run: pip install ruff
      - run: ruff check .

  # ── TypeScript lint ──────────────────────────────────────────────────────────
  lint-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: ai-frontend/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('ai-frontend/package-lock.json') }}
      - run: npm ci
        working-directory: ai-frontend
      - run: npm run lint
        working-directory: ai-frontend

  # ── Bandit SAST ──────────────────────────────────────────────────────────────
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - name: Bandit (report medium+)
        run: bandit -r . -x ./tests,./venv --severity-level medium -f json -o bandit-report.json || true
      - name: Bandit (fail on high+)
        run: bandit -r . -x ./tests,./venv --severity-level high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ── Backend tests ────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dev-${{ hashFiles('requirements-dev.txt') }}
      - run: pip install -r requirements-dev.txt
      - run: pytest --tb=short

  # ── Frontend tests ───────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: ai-frontend/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('ai-frontend/package-lock.json') }}
      - run: npm ci
        working-directory: ai-frontend
      - run: npm test -- --ci --passWithNoTests
        working-directory: ai-frontend

  # ── Build + Trivy scan + push to ECR ────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-backend, lint-frontend, sast, test-backend, test-frontend]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build \
            -t $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$BACKEND_REPO:latest \
            .

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build frontend image
        run: |
          docker build \
            -t $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }} \
            -t $ECR_REGISTRY/$FRONTEND_REPO:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_KEY }} \
            ./ai-frontend

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push images to ECR
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          docker push $ECR_REGISTRY/$BACKEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$BACKEND_REPO:latest
          docker push $ECR_REGISTRY/$FRONTEND_REPO:${{ github.sha }}
          docker push $ECR_REGISTRY/$FRONTEND_REPO:latest
