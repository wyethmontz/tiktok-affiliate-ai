# Used on EC2 — pulls pre-built images from ECR instead of building from source.
# Copy this file to /opt/app/docker-compose.yml on the server during initial setup.
services:
  backend:
    image: ${BACKEND_IMAGE}
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
